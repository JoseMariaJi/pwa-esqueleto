<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Esqueleto</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#FF0000">
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
</head>
<body>
    <div id="overlay" onclick="toggleMenu()"></div>

    <nav id="side-menu">
        <div class="menu-header">Menú Principal</div>
        <ul>
            <li onclick="navegar('opcion1', 'tipo1')">Opción 1 (Con Submenú)</li>
            <li onclick="navegar('opcion2', 'tipo1')">Opción 2 (Con Submenú)</li>
            <li onclick="navegar('opcion3', 'tipo2')">Opción 3 (Subpágina)</li>
            <li onclick="navegar('opcion4', 'tipo2')">Opción 4 (Subpágina)</li>
            </ul>
    </nav>

    <header id="main-header">
        <div id="header-main-nav">
            <button class="icon-btn" onclick="toggleMenu()">☰</button>
            <span id="header-title">Mi App</span>
            <div class="dropdown">
                <button class="icon-btn" onclick="toggleSubMenu()">⋮</button>
                <div id="submenu-content" class="submenu">
                    <button onclick="accion('A')">Acción A</button>
                    <button onclick="accion('B')">Acción B</button>
                </div>
            </div>
        </div>

        <div id="header-back-nav" style="display: none;">
            <button class="icon-btn" onclick="volver()">←</button>
            <span id="header-subtitle">Nombre Opción</span>
        </div>
    </header>

    <main id="app-content">
        <section id="view-home">
            <h1>Bienvenido</h1>
            <p>Selecciona una opción del menú.</p>
            <button id="btn-install" style="display: none;">Instalar App</button>
        </section>
    </main>

    <footer id="main-footer">
    <div class="footer-content">
        <span>App PWA. Versión: <b id="app-version">1.0.0</b></span>
        <span id="connection-status">● Online</span>
    </div>
</footer>
    <script src="./version-actual.js"></script>
    <script src="./app.js" defer></script>
</body>
</html>
