<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Esqueleto</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0000ff">
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
</head>
<body>
    <div id="overlay"></div>

    <nav id="side-menu">
<div class="menu-banner">
        <div class="menu-user-info">
            <img src="./icons/icon-192.png" alt="Logo" class="menu-avatar">
            <span>Nombre de la App</span>
        </div>
    </div>
        <ul>
        <li onclick="navegar('Opción 1', 'tipo1')">
            <span class="icon">🏠</span> Principal
        </li>
        <li onclick="navegar('Opción 2', 'tipo1')">
            <span class="icon">😏</span> Ayuda
        </li>
        
        <hr class="menu-divider">
        
        <li onclick="navegar('Opción 3', 'tipo2')">
            <span class="icon">👤</span> Perfil Usuario
        </li>
        <li onclick="navegar('Opción 4', 'tipo2')">
            <span class="icon">⚙️</span> Configuración
        </li>
        </ul>
    </nav>

    <header id="main-header">
        <div id="header-main-nav">
            <button class="icon-btn" onclick="toggleMenu()">☰</button>
            <span id="header-title">Mi App</span>
            <div class="dropdown">
                <button class="icon-btn" onclick="toggleSubMenu()">⋮</button>
                <div id="submenu-content" class="submenu">
                    <button onclick="accion('A')">Acción A</button>
                    <button onclick="accion('B')">Acción B</button>
                </div>
            </div>
        </div>

        <div id="header-back-nav" style="display: none;">
            <button class="icon-btn" onclick="volver()">←</button>
            <span id="header-subtitle">Nombre Opción</span>
        </div>
    </header>

    <main id="app-content">
        <section id="view-home">
            <h1>Bienvenido</h1>
            <p>Selecciona una opción del menú.</p>
            <button id="btn-install" style="display: none;">Instalar App</button>
        </section>
    </main>

    <footer id="main-footer">
    <div class="footer-content">
        <span>App PWA. Versión: <b id="app-version">1.0.0</b></span>
        <span id="connection-status">● Online</span>
    </div>
</footer>
<script>
  const script = document.createElement('script');
  script.src = "./version-actual.js?v=" + new Date().getTime();
  script.onload = () => {
      // Avisamos a app.js que la versión ya está lista
      window.dispatchEvent(new Event('version-lista'));
  };
  document.head.appendChild(script);
</script>
    <script src="./app.js" defer></script>
</body>
</html>
